<!-- Decorative icon (text nearby) -->
<svg class="icon icon--md" aria-hidden="true">
  <use href="#icon-arrow"></use>
</svg>

<!-- Meaningful icon (button with no text) — aria-label on the button -->
<button class="button button--secondary" type="button" aria-label="Close">
  <svg class="icon icon--sm" aria-hidden="true">
    <use href="#icon-close"></use>
  </svg>
</button>
