<section class="sg-section" id="comp-circle-icoon" data-nav-target>
  <h2 class="sg-section__title">Circle Icon</h2>
  <p class="sg-section__desc">
    Размеры: <code>sm</code> (34), <code>md</code> (46).
    Цвета: <code>tr-blue</code>, <code>tr-orange</code>, <code>tr-green</code>,
    <code>tr-red</code>.
  </p>

  <div class="sg-matrix sg-matrix--narrow">
    <div class="sg-matrix__head">
      <span></span>
      <span class="sg-state-label">Size S</span>
      <span class="sg-state-label">Size M</span>
      <span></span>
    </div>

    <div class="sg-matrix__row">
      <span class="sg-variant-label">Tr Blue</span>
      <div class="sg-cell"><x-circle-icon size="sm" color="tr-blue" icon="winner"></x-circle-icon></div>
      <div class="sg-cell"><x-circle-icon size="md" color="tr-blue" icon="winner"></x-circle-icon></div>
      <div class="sg-cell"></div>
    </div>
    <div class="sg-matrix__row">
      <span class="sg-variant-label">Tr Orange</span>
      <div class="sg-cell"><x-circle-icon size="sm" color="tr-orange" icon="winner"></x-circle-icon></div>
      <div class="sg-cell"><x-circle-icon size="md" color="tr-orange" icon="winner"></x-circle-icon></div>
      <div class="sg-cell"></div>
    </div>

    <div class="sg-matrix__row">
      <span class="sg-variant-label">Tr Green</span>
      <div class="sg-cell"><x-circle-icon size="sm" color="tr-green" icon="winner"></x-circle-icon></div>
      <div class="sg-cell"><x-circle-icon size="md" color="tr-green" icon="winner"></x-circle-icon></div>
      <div class="sg-cell"></div>
    </div>

    <div class="sg-matrix__row">
      <span class="sg-variant-label">Tr Red</span>
      <div class="sg-cell"><x-circle-icon size="sm" color="tr-red" icon="winner"></x-circle-icon></div>
      <div class="sg-cell"><x-circle-icon size="md" color="tr-red" icon="winner"></x-circle-icon></div>
      <div class="sg-cell"></div>
    </div>
  
  </div>

  <sg-snippet title="x-circle-icon">
    <x-circle-icon size="sm" color="tr-blue" icon="winner"></x-circle-icon>
  </sg-snippet>
</section>
