<script props>
  /*
   * x-tab-button
   *
   * Small uppercase label. Renders a <span> with optional 14px icon on the left.
   *
   * Props:
   *   type — black | white | non-border (default: black)
   *   status - active | default (default : default)
   *
   */
  const type = props.type || 'black';
  const status = props.status || 'default';

  module.exports = { type, status }
</script>

<span class="tab-button">
  <span class="tab-button--{{ type }}--{{ status }}"><yield></yield></span>
</span>
